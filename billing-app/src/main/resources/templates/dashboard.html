<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | BillingSec SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-hover:hover { transform: translateY(-3px); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">BillingSec <span class="text-primary">Enterprise</span></a>
        <div class="d-flex">
            <a href="/api/usuarios/perfil" class="btn btn-outline-light btn-sm me-3 fw-bold">⚙️ Configuración</a>
            <a href="/login" class="btn btn-danger btn-sm fw-bold">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body d-flex align-items-center bg-white rounded">
                    <form th:action="@{/api/facturas/buscar}" method="get" class="w-100 d-flex">
                        <input type="text" name="cliente" class="form-control form-control-lg me-3 border-light bg-light" placeholder="Buscar cliente o deje vacío para ver todos...">
                        <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold shadow-sm">Buscar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0 bg-primary text-white h-100 card-hover">
                <div class="card-body">
                    <h6 class="fw-bold mb-3">📁 Importación Masiva (XML)</h6>
                    <form th:action="@{/api/facturas/importar-xml}" method="post" class="d-flex">
                        <input type="text" name="xmlData" class="form-control border-0 me-2" placeholder="<factura>..." required>
                        <button type="submit" class="btn btn-light fw-bold text-primary px-3 shadow-sm">Subir</button>
                    </form>
                    <div th:if="${mensajeXML}" class="mt-2 small text-warning fw-bold" th:text="${mensajeXML}"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-5">
        <div class="card-header bg-white py-3 border-bottom border-light">
            <h5 class="mb-0 fw-bold text-secondary">Historial de Transacciones</h5>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-muted">
                <tr>
                    <th class="ps-4 py-3">Folio Fiscal</th>
                    <th class="py-3">Razón Social del Cliente</th>
                    <th class="py-3">Monto Total</th>
                    <th class="py-3">Estado</th>
                    <th class="text-end pe-4 py-3">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="f : ${facturas}">
                    <td class="ps-4 fw-bold text-primary">#<span th:text="${f.id}"></span></td>
                    <td th:text="${f.cliente}" class="fw-bold text-dark"></td>
                    <td class="text-secondary fw-bold">$<span th:text="${f.monto}"></span> USD</td>
                    <td><span class="badge bg-success rounded-pill px-3">Procesada</span></td>
                    <td class="text-end pe-4">
                        <a th:href="@{'/api/facturas/ver/' + ${f.id}}" class="btn btn-sm btn-outline-primary fw-bold px-3">Ver Documento</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-5" style="max-width: 800px; margin: auto;">
        <div class="card-header bg-white py-3 border-bottom border-light">
            <h5 class="mb-0 fw-bold text-secondary">Emitir Comprobante Oficial</h5>
        </div>
        <div class="card-body p-4 bg-light">
            <form th:action="@{/api/facturas/crear}" method="post">
                <div class="row">
                    <div class="col-md-7 mb-3">
                        <label class="form-label fw-bold text-secondary small">NOMBRE DEL CLIENTE</label>
                        <input type="text" name="cliente" class="form-control border-0 shadow-sm py-2" placeholder="Ej. Corporativo Internacional" required>
                    </div>
                    <div class="col-md-5 mb-3">
                        <label class="form-label fw-bold text-secondary small">MONTO (USD)</label>
                        <input type="number" name="monto" class="form-control border-0 shadow-sm py-2" placeholder="0.00" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary small">DESCRIPCIÓN Y NOTAS DE VENTA</label>
                    <textarea name="detalle" class="form-control border-0 shadow-sm" rows="3" placeholder="Soporta formato avanzado..." required></textarea>
                </div>
                <button type="submit" class="btn btn-success py-3 fw-bold w-100 shadow-sm fs-5">Generar Factura en Sistema</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
