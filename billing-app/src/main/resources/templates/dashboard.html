<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | BillingSec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Mis Facturas</h2>
        <a href="/login" class="btn btn-outline-danger">Cerrar Sesión</a>
    </div>

    <form th:action="@{/api/facturas/buscar}" method="get" class="d-flex mb-4">
        <input type="text" name="cliente" class="form-control me-2" placeholder="Buscar por cliente...">
        <button type="submit" class="btn btn-dark">Buscar</button>
    </form>

    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark"><tr><th>ID</th><th>Cliente</th><th>Monto</th><th>Acción</th></tr></thead>
        <tbody>
        <tr th:each="f : ${facturas}">
            <td th:text="${f.id}"></td><td th:text="${f.cliente}"></td><td th:text="${f.monto}"></td>
            <td><a th:href="@{'/api/facturas/ver/' + ${f.id}}" class="btn btn-sm btn-info">Ver Detalle</a></td>
        </tr>
        </tbody>
    </table>

    <hr>
    <h4>Nueva Factura</h4>
    <form th:action="@{/api/facturas/crear}" method="post" class="bg-white p-3 shadow-sm">
        <input type="text" name="cliente" class="form-control mb-2" placeholder="Cliente" required>
        <input type="number" name="monto" class="form-control mb-2" placeholder="Monto" required>
        <textarea name="detalle" class="form-control mb-2" placeholder="Observaciones (Soporta HTML)..." required></textarea>
        <button type="submit" class="btn btn-success">Guardar Factura</button>
    </form>
</div>
</body>
</html>
