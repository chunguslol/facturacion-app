<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión Corporativa | BillingSec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-danger">🛡️ Panel de Administración (Solo Personal Autorizado)</h2>
        <a href="/api/facturas/dashboard" class="btn btn-secondary">Volver al Dashboard</a>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Usuarios del Sistema</h5>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Rol de Acceso</th>
                            <th>Hash (MD5)</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${usuarios}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}" class="fw-bold"></td>
                            <td>
                                <span th:if="${user.rol == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                                <span th:if="${user.rol == 'USER'}" class="badge bg-primary">USER</span>
                            </td>
                            <td th:text="${user.passwordHash}" class="text-muted small" style="font-family: monospace;"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">Crear Nuevo Empleado</h5>
                </div>
                <div class="card-body">
                    <p class="small text-muted">Nota: La contraseña por defecto será asignada por el sistema.</p>
                    <form th:action="@{/api/usuarios/crear}" method="post">
                        <div class="mb-3">
                            <label>Nombre de Usuario</label>
                            <input type="text" name="username" class="form-control" placeholder="ej. j.perez" required>
                        </div>
                        <div class="mb-3">
                            <label>Rol en el Sistema</label>
                            <select name="rol" class="form-select">
                                <option value="USER">Empleado (USER)</option>
                                <option value="ADMIN">Gerente (ADMIN)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Registrar Empleado</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
