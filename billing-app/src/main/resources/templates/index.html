<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BillingSec Professional | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">BillingSec Pro</a>
    </div>
</nav>

<div class="container">
    <!-- Resumen de Métricas -->
    <div class="row mb-4">
        <div class="col-md-4"><div class="card p-3 text-center"><h5>Facturas Totales</h5><h2>1,250</h2></div></div>
        <div class="col-md-4"><div class="card p-3 text-center"><h5>Ingresos Mensuales</h5><h2>$45,000</h2></div></div>
        <div class="col-md-4"><div class="card p-3 text-center"><h5>Usuarios Activos</h5><h2>85</h2></div></div>
    </div>

    <!-- BUSCADOR VULNERABLE (SQL INJECTION) -->
    <div class="card p-4 mb-4">
        <h4>Buscar Facturas por Cliente</h4>
        <form th:action="@{/api/facturas/buscar}" method="get" class="row g-3">
            <div class="col-auto">
                <input type="text" name="cliente" class="form-control" placeholder="Nombre del cliente...">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Buscar</button>
            </div>
        </form>
    </div>

    <!-- FORMULARIO DE OBSERVACIONES (VULNERABLE XSS) -->
    <div class="card p-4">
        <h4>Crear Nueva Factura</h4>
        <form th:action="@{/api/facturas/crear}" method="post">
            <div class="mb-3">
                <label>Observaciones (Nota interna):</label>
                <!-- Aquí es donde inyectaremos el script de XSS -->
                <textarea name="detalle" class="form-control" placeholder="Ej: Pago pendiente..."></textarea>
            </div>
            <button type="submit" class="btn btn-success">Guardar Factura</button>
        </form>
    </div>
</div>

</body>
</html>
