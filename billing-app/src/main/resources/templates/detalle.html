<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BillingSec | Detalle de Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-danger mb-4">CONFIDENCIAL - Detalle de Factura</h2>

        <div class="mb-3">
            <strong>ID de Factura:</strong> <span th:text="${factura.id}"></span>
        </div>
        <div class="mb-3">
            <strong>Cliente:</strong> <span th:text="${factura.cliente}"></span>
        </div>
        <div class="mb-3">
            <strong>Monto Total:</strong> $<span th:text="${factura.monto}"></span>
        </div>
        <div class="mb-3">
            <strong>Observaciones Secretas:</strong> <span th:text="${factura.detalle}"></span>
        </div>

        <a href="/api/facturas/" class="btn btn-secondary mt-3">Volver al Dashboard</a>
    </div>
</div>

</body>
</html>
