<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle | BillingSec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 shadow border-danger">
        <h2 class="text-danger">Factura Confidencial #<span th:text="${factura.id}"></span></h2>
        <p><strong>Propietario ID:</strong> <span th:text="${factura.propietarioId}"></span></p>
        <p><strong>Cliente:</strong> <span th:text="${factura.cliente}"></span></p>
        <p><strong>Monto:</strong> $<span th:text="${factura.monto}"></span></p>

        <div class="alert alert-warning">
            <strong>Observaciones:</strong>
            <span th:utext="${factura.detalle}"></span>
        </div>

        <a href="/api/facturas/dashboard" class="btn btn-secondary">Volver al Dashboard</a>
    </div>
</div>
</body>
</html>
