<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BillingSec | Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">
<div class="card p-4 shadow" style="width: 25rem;">
    <h3 class="text-center mb-4 text-primary">BillingSec Pro</h3>
    <div th:if="${param.error}" class="alert alert-danger text-center">Credenciales incorrectas</div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3"><label>Usuario</label><input type="text" name="username" class="form-control" required></div>
        <div class="mb-3"><label>Contraseña</label><input type="password" name="password" class="form-control" required></div>
        <button type="submit" class="btn btn-primary w-100">Ingresar al Sistema</button>
    </form>
</div>
</body>
</html>
