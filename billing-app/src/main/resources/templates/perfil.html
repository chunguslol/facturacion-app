<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | BillingSec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 shadow" style="max-width: 600px; margin: auto;">
        <h2>⚙️ Configuración de Perfil</h2>
        <div th:if="${param.actualizado}" class="alert alert-success">Perfil actualizado correctamente.</div>

        <form th:action="@{/api/usuarios/perfil/actualizar}" method="post">
            <div class="mb-3">
                <label>Nombre de Usuario:</label>
                <input type="text" name="username" class="form-control" th:value="${usuario.username}" required>
            </div>
            <div class="mb-3">
                <label>Tu Nivel de Privilegios Actual (Lectura):</label>
                <input type="text" class="form-control bg-light" th:value="${usuario.rol}" disabled>
            </div>
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="/api/facturas/dashboard" class="btn btn-secondary">Volver</a>
        </form>
    </div>
</div>
</body>
</html>
